stryker4s {
  // Ring 5 — retargeted to oracle-core's changed production files (pure kernel).
  // Re-point this glob to each spec's changed files before running.
  // Globs are resolved relative to the mutated module's base dir (`core`), so use
  // base-agnostic `**` patterns rather than repo-root paths.
  mutate = [
    "**/domain/Evaluation.scala",
    "**/domain/StateProfile.scala",
    "**/spec/Spec.scala"
  ]

  thresholds {
    high = 95
    low = 91
    break = 90
  }
}
